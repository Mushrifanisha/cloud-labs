<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
        }

        header{
            padding:20px 10%;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .hero{
            height:85vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        .hero h1{
            font-size:55px;
        }

        .hero p{
            margin:20px 0;
            font-size:20px;
        }

        .btn{
            padding:12px 25px;
            background:white;
            color:#2196f3;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#222;
            color:white;
        }

        footer{
            text-align:center;
            padding:20px;
            background:rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

<header>
    <h2>MySite</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to My Website</h1>
    <p>Create amazing websites with HTML & CSS.</p>

    <a href="#" class="btn">Get Started</a>
</section>

<footer>
    <p>© 2026 MySite | All Rights Reserved</p>
</footer>

</body>
</html>
